<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeWeb – Resume Analyser & Skill Gap Detector</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #003636, #001a1a, #000);
            overflow-x: hidden;
        }

        #sparkCanvas {
            position: fixed;
            inset: 0;
            z-index: -10;
        }
    </style>
</head>

<body class="text-white min-h-screen flex flex-col">

    <!-- PARTICLE BACKGROUND -->
    <canvas id="sparkCanvas"></canvas>

    <script>
        const canvas = document.getElementById("sparkCanvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        const sparks = Array.from({ length: 140 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.8 + 0.4,
            dx: (Math.random() - 0.5) * 0.25,
            dy: (Math.random() - 0.5) * 0.25,
            alpha: Math.random()
        }));

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            sparks.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,170,60,${s.alpha})`;
                ctx.shadowColor = "rgba(255,170,60,0.8)";
                ctx.shadowBlur = 10;
                ctx.fill();

                s.x += s.dx;
                s.y += s.dy;

                if (s.x < 0 || s.x > canvas.width) s.x = Math.random() * canvas.width;
                if (s.y < 0 || s.y > canvas.height) s.y = Math.random() * canvas.height;
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>

    <!-- Header -->
    <header class="w-full py-4 bg-[#002727]/90 backdrop-blur-md sticky top-0 z-50 border-b border-[#0f766e]">
        <div class="max-w-7xl mx-auto flex items-center justify-between px-6">

            <!-- Logo -->
            <a href="{% url 'home' %}" class="text-2xl font-extrabold text-[#3dd6b8] tracking-wide">
                ResumeWeb
            </a>

            <!-- Nav -->
            <nav class="hidden md:flex items-center gap-8 text-[#7fffe9] font-medium">
                <a href="{% url 'home' %}#about" class="hover:text-white transition">About</a>
                <a href="{% url 'home' %}#features" class="hover:text-white transition">Features</a>
                <a href="{% url 'home' %}#how" class="hover:text-white transition">How it works</a>
            </nav>

            <!-- Actions -->
            <div class="flex gap-3 items-center">
                {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}"
                    class="text-[#3dd6b8] hover:text-white transition hidden md:inline mr-4 font-semibold">
                    Dashboard
                </a>
                <span class="text-[#7fffe9] hidden md:inline">Hello, {{ user.username|default:user.email }}</span>
                <a href="{% url 'logout' %}"
                    class="px-4 py-2 border border-red-400 rounded-lg text-red-400 hover:bg-red-400 hover:text-[#002727] transition">
                    Logout
                </a>
                {% else %}
                <a href="{% url 'login' %}"
                    class="px-4 py-2 border border-[#3dd6b8] rounded-lg text-[#3dd6b8] hover:bg-[#3dd6b8] hover:text-[#002727] transition">
                    Login
                </a>
                <a href="{% url 'signup' %}"
                    class="px-4 py-2 bg-[#3dd6b8] text-[#002727] rounded-lg font-semibold hover:shadow-[0_0_15px_#3dd6b8] transition">
                    Sign Up
                </a>
                {% endif %}
            </div>

        </div>
    </header>

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-6 text-center text-gray-500 text-sm bg-[#001a1a]">
        <!-- Footer content removed as requested -->
    </footer>

</body>

</html>
